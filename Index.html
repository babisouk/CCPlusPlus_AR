            init: function () {
                const target = document.getElementById("target0");
                const btn = document.querySelector("button");
                const video0 = document.getElementById("AlexaAppartVideo");

                // detect target found
                target.addEventListener("targetFound", event => {
                    console.log("target found");
                    this.found = true;
                    video0.play();
                });
                // detect target lost
                target.addEventListener("targetLost", event => {
                    console.log("target lost");
                    this.found = false
                    video0.pause();
                });
            }
        })

    <a-scene mindar-image="imageTargetSrc: ./targets4.mind;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
